databases:
  - name: hourstack-db
    databaseName: hourstack
    user: hourstack
    plan: free

services:
  - type: web
    name: hourstack
    plan: free
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: |
      cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt && alembic upgrade heads
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hourstack-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://hourstack.onrender.com
      - key: FRONTEND_URL
        value: https://hourstack.onrender.com
      # --- Fill these in from your Lemon Squeezy dashboard ---
      - key: LEMONSQUEEZY_API_KEY
        value: your_api_key_here
      - key: LEMONSQUEEZY_STORE_ID
        value: your_store_id_here
      - key: LEMONSQUEEZY_VARIANT_ID
        value: your_variant_id_here
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        value: your_webhook_secret_here
      # --- Fill these in with your SMTP credentials ---
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: your@gmail.com
      - key: SMTP_PASSWORD
        value: your-app-password
      - key: FROM_EMAIL
        value: your@gmail.com
